<!-- docs/troubleshooting.html -->
<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title.docs.troubleshooting">Troubleshooting — NEO SSH-Win Manager</title>
  <link rel="icon" type="image/png" href="../assets/app_icon_only.png" />
  <link rel="stylesheet" href="../assets/css/site.css" />
  <script src="../assets/js/i18n.js" defer></script>
  <script src="../assets/js/site.js" defer></script>
  <script src="../assets/js/layout.js" defer></script>
</head>
<body>
  <div data-layout="topbar" data-pathprefix="../"></div>
  <div class="container">
    <div class="docs">
      <div data-layout="docs-sidebar" data-pathprefix="../"></div>
      <main class="docs-main">

      <!-- ==================== HERO ==================== -->
      <span class="eyebrow" data-i18n="ts.eyebrow"></span>
      <h1 data-i18n="ts.title"></h1>
      <p class="lead" data-i18n="ts.lead"></p>

      <!-- ==================== sshfs.exe not found ==================== -->
      <h2 id="nosshfs" data-i18n="ts.h.nosshfs"></h2>
      <p data-i18n="ts.nosshfs.body"></p>
      <ul>
        <li><code>C:\Program Files\SSHFS-Win\bin\sshfs.exe</code></li>
        <li><code>C:\Program Files (x86)\SSHFS-Win\bin\sshfs.exe</code></li>
      </ul>
      <p data-i18n="ts.nosshfs.note"></p>

      <!-- ==================== mount point in use ==================== -->
      <h2 id="mountpoint" data-i18n="ts.h.mountpoint"></h2>
      <p data-i18n="ts.mountpoint.body"></p>
      <ol>
        <li data-i18n="ts.mountpoint.li1"></li>
        <li data-i18n="ts.mountpoint.li2"></li>
        <li data-i18n="ts.mountpoint.li3"></li>
        <li data-i18n="ts.mountpoint.li4"></li>
      </ol>

      <!-- ==================== Authentication failed ==================== -->
      <h2 id="authfail" data-i18n="ts.h.authfail"></h2>
      <ul>
        <li data-i18n="ts.authfail.li1"></li>
        <li data-i18n="ts.authfail.li2"></li>
        <li data-i18n="ts.authfail.li3"></li>
        <li data-i18n="ts.authfail.li4"></li>
      </ul>

      <!-- ==================== Connection refused ==================== -->
      <h2 id="connrefused" data-i18n="ts.h.connrefused"></h2>
      <p data-i18n="ts.connrefused.body"></p>
      <pre><code>ssh -p &lt;port&gt; &lt;user&gt;@&lt;host&gt;</code></pre>
      <p data-i18n="ts.connrefused.note"></p>

      <!-- ==================== Access denied ==================== -->
      <h2 id="accessdenied" data-i18n="ts.h.accessdenied"></h2>
      <p data-i18n="ts.accessdenied.body"></p>
      <pre><code>-oidmap=user -ouid=-1 -ogid=-1
-oumask=000 -ocreate_umask=000
-odefault_permissions</code></pre>
      <p data-i18n="ts.accessdenied.note"></p>

      <!-- ==================== App not in foreground ==================== -->
      <h2 id="nostart" data-i18n="ts.h.nostart"></h2>
      <p data-i18n="ts.nostart.body"></p>
      <ul>
        <li data-i18n="ts.nostart.li1"></li>
        <li data-i18n="ts.nostart.li2"></li>
      </ul>

      <!-- ==================== View logs ==================== -->
      <h2 id="logs" data-i18n="ts.h.logs"></h2>
      <p data-i18n="ts.logs.body"></p>

      </main>
    </div>
  </div>
  <div data-layout="footer" data-pathprefix="../"></div>
</body>
</html>
