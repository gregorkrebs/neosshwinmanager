<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="title.docs.authentication">Authentifizierung — NEO SSH-Win Manager</title>
  <link rel="icon" type="image/png" href="../assets/app_icon_only.png" />
  <link rel="stylesheet" href="../assets/css/site.css" />
  <script src="../assets/js/i18n.js" defer></script>
  <script src="../assets/js/site.js" defer></script>
  <script src="../assets/js/layout.js" defer></script>
</head>
<body>
  <div data-layout="topbar" data-pathprefix="../"></div>
  <div class="container">
    <div class="docs">
      <div data-layout="docs-sidebar" data-pathprefix="../"></div>
      <main class="docs-main">
        <h1 data-i18n="auth.title"></h1>
        <p class="lead" data-i18n="auth.lead"></p>

        <h2 data-i18n="auth.h.password"></h2>
        <p data-i18n="auth.password.body"></p>
        <h3 data-i18n="auth.h.password.storage"></h3>
        <ul>
          <li data-i18n="auth.password.li1"></li>
          <li data-i18n="auth.password.li2"></li>
          <li data-i18n="auth.password.li3"></li>
        </ul>

        <h2 data-i18n="auth.h.key"></h2>
        <p data-i18n="auth.key.body"></p>
        <p data-i18n="auth.key.mount"></p>
        <pre><code>-oBatchMode=yes
-oPreferredAuthentications=publickey</code></pre>
        <p data-i18n="auth.key.batchmode"></p>
        <p data-i18n="auth.key.cert"></p>

        <h3 data-i18n="auth.h.ppk"></h3>
        <p data-i18n="auth.ppk.body"></p>
        <div class="callout">
          <span class="callout-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg></span>
          <div>
            <strong data-i18n="auth.h.ppk"></strong>
            <span data-i18n="auth.ppk.note"></span>
          </div>
        </div>

        <h2 data-i18n="auth.h.ask"></h2>
        <p data-i18n="auth.ask.body"></p>
        <ul>
          <li data-i18n="auth.ask.li1"></li>
          <li data-i18n="auth.ask.li2"></li>
          <li data-i18n="auth.ask.li3"></li>
        </ul>

        <h2 data-i18n="auth.h.encryption"></h2>
        <p data-i18n="auth.encryption.body"></p>

        <div class="callout">
          <span class="callout-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4M12 8h.01"></path></svg></span>
          <div>
            <strong data-i18n="auth.key.note"></strong>
            <span data-i18n="auth.key.unattended"></span>
          </div>
